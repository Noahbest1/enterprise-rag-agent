# One-command full stack.
# Usage:
#   DASHSCOPE_API_KEY=sk-... docker compose up --build
#
# Services wired today:
#   api       -- FastAPI RAG service
#   qdrant    -- vector DB (integrated Day 2)
#   postgres  -- orders / feedback / users (integrated Day 3)
#   redis     -- LangGraph checkpoint + LLM cache (integrated Day 4)
#
# data/kb/ is bind-mounted so you can build KBs from the host without
# rebuilding the image.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-api:local
    container_name: rag-api
    ports:
      - "8008:8008"
    environment:
      - ENV=dev
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - COPILOT_QWEN_MODEL=${COPILOT_QWEN_MODEL:-qwen-plus}
      - COPILOT_CORS_ALLOW_ORIGINS=${COPILOT_CORS_ALLOW_ORIGINS:-http://127.0.0.1:5714,http://localhost:5714}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql+psycopg://rag:rag@postgres:5432/rag
    volumes:
      - ./data:/app/data
      # Persist HuggingFace model cache across image rebuilds.
      - hf-cache:/home/rag/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag-qdrant
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rag", "-d", "rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

volumes:
  qdrant-data:
  postgres-data:
  redis-data:
  hf-cache:
